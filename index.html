<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Shortlist — Drafting your post</title>
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --accent: #0a66c2;
    --text: #111111;
    --subtext: #666666;
    --muted: #888888;
    --border: #e0e0e0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 40px 32px;
    text-align: center;
  }
  .label {
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--text);
    margin: 0 0 12px;
    line-height: 1.3;
  }
  p {
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--subtext);
    margin: 0 0 8px;
  }
  p.detail {
    font-size: 0.85rem;
    color: var(--accent);
    margin-top: 14px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    margin: 8px auto 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .check {
    width: 48px;
    height: 48px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 1.6rem;
    line-height: 1;
  }
  .error-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 1.4rem;
    line-height: 1;
  }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="label">AI Shortlist</div>

  <div id="loading">
    <div class="spinner"></div>
    <h1>Drafting your post…</h1>
    <p>Opus is reading the article and writing.<br>This usually takes 20–40 seconds.</p>
  </div>

  <div id="success" class="hidden">
    <div class="check">✓</div>
    <h1>Sent</h1>
    <p>The draft is on its way to your inbox.</p>
    <p class="detail" id="successDetail"></p>
  </div>

  <div id="error" class="hidden">
    <div class="error-icon">!</div>
    <h1>Something went wrong</h1>
    <p id="errorDetail"></p>
  </div>
</div>

<script>
  // Paste your Apps Script Web App URL here after deploying.
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyaI8HqGZou6DdehkD1Q7VxLkbjoQAwnFqs5V6qglERUgBJMiRKTe7mAB_BXSBfb1p7Bw/exec';

  function show(id) {
    ['loading', 'success', 'error'].forEach(function (el) {
      document.getElementById(el).classList.toggle('hidden', el !== id);
    });
  }

  function fail(msg) {
    document.getElementById('errorDetail').textContent = msg;
    show('error');
  }

  async function main() {
    const params = new URLSearchParams(window.location.search);
    const date = params.get('date');
    const choice = params.get('choice');
    const token = params.get('token');

    if (!date || !choice || !token) {
      return fail('Missing parameters in the URL.');
    }
    if (APPS_SCRIPT_URL.indexOf('PASTE_') === 0) {
      return fail('APPS_SCRIPT_URL is not configured. Edit index.html and redeploy.');
    }

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ date: date, choice: choice, token: token }),
      });
      if (!res.ok) throw new Error('Request failed: ' + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      document.getElementById('successDetail').textContent =
        data.source + ' — ' + data.headline;
      show('success');
    } catch (err) {
      fail(err.message);
    }
  }

  main();
</script>
</body>
</html>
